server {
    listen 5173;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gérer le routage React/Vite (si une route n'est pas un fichier, renvoyer index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rediriger toutes les requêtes /api vers le container du backend (qui s'appelle 'backend' dans docker-compose)
    # Proxy pour les requêtes API vers le backend Docker
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Debug headers
        add_header X-Proxy-Target http://backend:3001 always;
    }

    # Rediriger également l'accès aux dossiers de fichiers (uploads, file_commandes, etc.) vers le backend
    location /mouchard {
        proxy_pass http://backend:3001/mouchard;
    }
    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
    }
    location /file_commandes/ {
        proxy_pass http://backend:3001/file_commandes/;
    }
    location /file_factures/ {
        proxy_pass http://backend:3001/file_factures/;
    }
    location /file_certif/ {
        proxy_pass http://backend:3001/file_certif/;
    }
}
