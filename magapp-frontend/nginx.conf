server {
    listen 5174;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gérer le routage React/Vite (si une route n'est pas un fichier, renvoyer index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rediriger toutes les requêtes /api vers le container du backend (qui s'appelle 'backend' dans docker-compose)
    # Proxy pour les requêtes API vers le backend Docker
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Servir les images depuis le dossier partagé ou via le backend
    location /img/ {
        alias /usr/share/nginx/html/img/;
        try_files $uri @backend_img;
    }

    location @backend_img {
        proxy_pass http://backend:3001;
    }
}
