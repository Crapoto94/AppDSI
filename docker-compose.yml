version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appdsi-backend
    ports:
      # Mappe le port 3001 du conteneur vers le port 3001 de l'hôte Proxmox
      - "3001:3001"
    extra_hosts:
      # Le conteneur Linux (réseau bridge) ne résout pas le nom NetBIOS court
      # "nas-syno05" comme le fait Windows via le DNS AD (ivry.local).
      # On mappe explicitement le nom du filer SMB vers son IP pour que
      # l'accès au partage UNC (\\nas-syno05\editions$\DSIHUB) fonctionne.
      - "nas-syno05:10.103.131.136"
    environment:
      # PostgreSQL externe (10.103.130.106)
      - POSTGRES_HOST=10.103.130.106
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ivry_admin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ivrypassword}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
    volumes:
      # Dossiers de fichiers persistés
      - ./backend/uploads:/app/uploads
      - ./backend/file_commandes:/app/file_commandes
      - ./backend/file_factures:/app/file_factures
      - ./backend/file_certif:/app/file_certif
      - ./backend/file_telecom:/app/file_telecom
      - ./backend/magapp_img:/app/magapp_img
      # Base de données SQLite persistée
      - ./backend/data:/app/data
      # Dossier de logs pour éviter les conflits de montage de fichiers inexistants
      - ./backend/logs:/app/logs
    networks:
      - app-network
    # Redémarre automatiquement le conteneur sauf s'il est explicitement arrêté
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appdsi-frontend
    ports:
      # Mappe le port 5173 du conteneur (configuré dans nginx.conf) vers le port 5173 de l'hôte
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  magapp-frontend:
    build:
      context: ./magapp-frontend
      dockerfile: Dockerfile
    container_name: appdsi-magapp-frontend
    ports:
      - "5174:5174"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  chat-frontend:
    build:
      context: ./chat-frontend
      dockerfile: Dockerfile
    container_name: appdsi-chat-frontend
    ports:
      - "5175:5175"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  # Définit un réseau commun pour que les conteneurs puissent communiquer entre eux
  app-network:
    driver: bridge
