version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: appdsi-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Utilisation d'un montage direct pour préserver le code source et faciliter la sauvegarde
      - ./backend/database.sqlite:/app/database.sqlite
      - ./backend/mouchard.log:/app/mouchard.log
      - uploads_data:/app/uploads
      - commandes_data:/app/file_commandes
      - factures_data:/app/file_factures
      - certif_data:/app/file_certif

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appdsi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads_data:
  commandes_data:
  factures_data:
  certif_data:
